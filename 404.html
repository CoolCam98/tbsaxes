<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Page Not Found — Tampa Bay Saxophone Collective</title>
<meta name="description" content="That page doesn't exist. Head back to the Tampa Bay Saxophone Collective homepage." />
<meta name="robots" content="noindex, follow" />

<link rel="icon" type="image/png" href="/assets/logos/logo-social-media-light.png" />
<link rel="apple-touch-icon" href="/assets/logos/logo-social-media-light.png" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Libre+Franklin:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">

<style>
  /* Status pages — minimal, centered, on-brand */
  .status-page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 24px;
    text-align: center;
    background: var(--cream);
    position: relative;
    overflow: hidden;
  }
  .status-page::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 300 300' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='p'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='2' seed='3'/%3E%3CfeColorMatrix values='0 0 0 0 0.08  0 0 0 0 0.15  0 0 0 0 0.24  0 0 0 0.08 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23p)'/%3E%3C/svg%3E");
    opacity: 0.5;
    mix-blend-mode: multiply;
    pointer-events: none;
  }
  .status-logo {
    width: 110px;
    height: 110px;
    margin-bottom: 36px;
    position: relative;
  }
  .status-code {
    font-family: var(--f-display);
    font-weight: 700;
    font-size: clamp(120px, 18vw, 220px);
    line-height: 0.85;
    color: var(--teal);
    opacity: 0.35;
    letter-spacing: 0.02em;
    margin-bottom: -20px;
    position: relative;
  }
  .status-kicker {
    font-family: var(--f-display);
    font-weight: 500;
    font-size: 11px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: 24px;
    position: relative;
  }
  .status-title {
    font-family: var(--f-display);
    font-weight: 600;
    font-size: clamp(36px, 5vw, 56px);
    line-height: 1.05;
    letter-spacing: 0.01em;
    text-transform: uppercase;
    color: var(--navy);
    margin-bottom: 20px;
    max-width: 720px;
    position: relative;
  }
  .status-title em {
    font-style: italic;
    font-weight: 400;
    color: var(--teal);
    font-family: 'Libre Franklin', sans-serif;
    text-transform: lowercase;
  }
  .status-body {
    font-family: var(--f-body);
    font-weight: 300;
    font-size: clamp(16px, 1.4vw, 19px);
    line-height: 1.55;
    color: var(--navy);
    max-width: 540px;
    margin-bottom: 44px;
    position: relative;
  }
  .status-actions {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    justify-content: center;
    position: relative;
  }
</style>
</head>
<body>

<div class="status-page">
  <img src="/assets/logos/logo-social-media-light.png" alt="Tampa Bay Saxophone Collective" class="status-logo">
  <div class="status-code">404</div>
  <div class="status-kicker">— Page not found —</div>
  <h1 class="status-title">This page <em>doesn't exist.</em></h1>
  <p class="status-body">
    The link's broken or the page has moved. Let's get you back to where the music is.
  </p>
  <div class="status-actions">
    <a href="/" class="btn btn-primary">Back to Home <span class="arrow">→</span></a>
    <a href="/#booking" class="btn btn-ghost">Book the Collective <span class="arrow">→</span></a>
  </div>
</div>

</body>
</html>
