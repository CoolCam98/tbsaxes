<style>
  /* Status pages — minimal, centered, on-brand */
  .status-page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 24px;
    text-align: center;
    background: var(--cream);
    position: relative;
    overflow: hidden;
  }
  .status-page::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 300 300' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='p'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='2' seed='3'/%3E%3CfeColorMatrix values='0 0 0 0 0.08  0 0 0 0 0.15  0 0 0 0 0.24  0 0 0 0.08 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23p)'/%3E%3C/svg%3E");
    opacity: 0.5;
    mix-blend-mode: multiply;
    pointer-events: none;
  }
  .status-logo {
    width: 110px;
    height: 110px;
    margin-bottom: 36px;
    position: relative;
  }
  .status-kicker {
    font-family: var(--f-display);
    font-weight: 500;
    font-size: 11px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: 24px;
    position: relative;
  }
  .status-title {
    font-family: var(--f-display);
    font-weight: 600;
    font-size: clamp(40px, 6vw, 72px);
    line-height: 1.05;
    letter-spacing: 0.01em;
    text-transform: uppercase;
    color: var(--navy);
    margin-bottom: 24px;
    max-width: 720px;
    position: relative;
  }
  .status-title em {
    font-style: italic;
    font-weight: 400;
    color: var(--teal);
    font-family: 'Libre Franklin', sans-serif;
    text-transform: lowercase;
  }
  .status-body {
    font-family: var(--f-body);
    font-weight: 300;
    font-size: clamp(16px, 1.4vw, 19px);
    line-height: 1.55;
    color: var(--navy);
    max-width: 540px;
    margin-bottom: 44px;
    position: relative;
  }
  .status-actions {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    justify-content: center;
    position: relative;
  }
</style>

<div class="status-page">

    Thanks for reaching out. We'll get back to you within 48 hours, Monday through Friday. In the meantime, find us on Instagram or Facebook for updates.
  </p>
  <div class="status-actions">

    <a href="https://www.instagram.com/tbsaxcollective/" target="_blank" rel="noopener" class="btn btn-ghost">Follow on Instagram <span class="arrow">↗</span></a>
  </div>
</div>
